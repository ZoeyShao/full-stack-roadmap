<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Full-Stack Roadmap 2026 Lectures</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #5d6875;
      --line: #dce3ea;
      --soft: #f6f8fa;
      --paper: #fffdf8;
      --accent: #0f766e;
      --accent-2: #9a6a10;
      --code: #eef2f5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font: 16px/1.62 ui-serif, Georgia, "Noto Serif CJK SC", "Source Han Serif SC", serif;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 42px 24px 76px;
    }
    h1, h2, h3, nav, .meta, .trace, .pill, button, .lecture-title {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    h1 { margin: 0 0 8px; font-size: 34px; line-height: 1.12; }
    h2 { margin: 32px 0 12px; padding-top: 18px; border-top: 1px solid var(--line); font-size: 22px; }
    h3 { margin: 20px 0 8px; font-size: 17px; }
    p { margin: 0 0 13px; }
    a { color: var(--accent); text-underline-offset: 3px; }
    code {
      background: var(--code);
      border-radius: 5px;
      padding: 1px 5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .92em;
    }
    .meta { color: var(--muted); font-size: 14px; }
    .layout {
      display: grid;
      grid-template-columns: 310px 1fr;
      gap: 26px;
      margin-top: 24px;
      align-items: start;
    }
    nav {
      position: sticky;
      top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 12px;
    }
    nav a {
      display: block;
      border-radius: 6px;
      padding: 8px 9px;
      color: var(--ink);
      text-decoration: none;
      font-size: 14px;
    }
    nav a[aria-current="page"] {
      color: white;
      background: var(--accent);
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 24px;
    }
    .trace {
      color: var(--accent-2);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .lecture-title { margin: 4px 0 10px; font-size: 30px; line-height: 1.16; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 16px 0;
    }
    .box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      padding: 14px 15px;
    }
    .box strong {
      display: block;
      margin-bottom: 5px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    ul, ol { padding-left: 22px; }
    li { margin: 7px 0; }
    .pill {
      display: inline-block;
      margin: 3px 5px 3px 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--muted);
      background: white;
      font-size: 12px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 7px;
      border: 1px solid var(--accent);
      color: white;
      background: var(--accent);
      text-decoration: none;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
    }
    .button.secondary {
      color: var(--accent);
      background: white;
    }
    @media (max-width: 860px) {
      main { padding: 30px 18px 60px; }
      .layout { grid-template-columns: 1fr; }
      nav { position: static; }
      .grid { grid-template-columns: 1fr; }
      .lecture-title { font-size: 26px; }
    }
    @media print {
      body { background: white; }
      main { max-width: none; padding: 20px; }
      nav, .actions { display: none; }
      .layout { display: block; }
      .panel { border: 0; padding: 0; }
      a { color: black; }
    }
  </style>
</head>
<body>
<main>

    <h1>Full-Stack Roadmap 2026 Lectures</h1>
    <p class="meta">仿 CS336 trace 组织方式：用 <code>?trace=lecture_01</code> 打开指定讲次。每讲连接短课、速查卡、官方资料和交付物。</p>
  </header>

  <div class="layout">
    <nav id="lecture-nav" aria-label="Lecture navigation"></nav>
    <article id="lecture" class="panel"></article>
  </div>
</main>

const nav = document.querySelector("#lecture-nav");
const article = document.querySelector("#lecture");
const params = new URLSearchParams(window.location.search);
const selectedTrace = params.get("trace") || "lecture_01";
const selected = lectures.find((lecture) => lecture.trace === selectedTrace) || lectures[0];

nav.innerHTML = lectures.map((lecture, index) => {
  const href = `?trace=${lecture.trace}`;
  const current = lecture.trace === selected.trace ? ' aria-current="page"' : "";
  return `<a href="${href}"${current}>${String(index + 1).padStart(2, "0")} ${lecture.title}</a>`;
}).join("");

function list(items) {
  return `<ul>${items.map((item) => `<li>${item}</li>`).join("")}</ul>`;
}

function sourceList(items) {
  return `<ul>${items.map(([label, url]) => `<li><a href="${url}">${label}</a></li>`).join("")}</ul>`;
}

article.innerHTML = `
  <div class="trace">${selected.quarter} · ${selected.trace}</div>
  <h2 class="lecture-title">${selected.title}</h2>
  <p>${selected.objective}</p>

  <div class="actions">

  ${sourceList(selected.sources)}

  <h2>学习动作</h2>
  <ol>
    <li>先读本页的目标和概念，不查资料，写下你已经知道的内容。</li>
    <li>打开短课，完成里面的互动题和练习。</li>
    <li>读官方资料中最相关的一页，把不懂的地方问 agent。</li>
    <li>完成交付物，并用自己的话解释为什么这样做。</li>
  </ol>
`;

</html>
